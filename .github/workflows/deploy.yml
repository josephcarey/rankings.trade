name: Deploy cron worker

# The main Worker (rankings-trade) is deployed via the Cloudflare dashboard
# Git integration (Workers Builds), so it is intentionally NOT deployed here.
# This workflow deploys only the scheduled cron Worker (rankings-trade-cron),
# which the dashboard integration does not cover.

on:
  push:
    branches:
      - main
    paths:
      - "worker/cron.ts"
      - "wrangler.cron.toml"
      - "src/**"
      - "migrations/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy-cron:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy cron worker to Cloudflare
        run: bun run deploy:cron
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
