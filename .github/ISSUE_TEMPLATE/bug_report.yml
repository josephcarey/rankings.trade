name: Bug report
description: Report a problem with rankings.trade
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail
        as you can so we can reproduce and fix it.
  - type: checkboxes
    id: search
    attributes:
      label: Existing issues
      options:
        - label: I searched the existing issues and this has not been reported yet.
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: input
    id: page-url
    attributes:
      label: Page / URL
      description: Where on rankings.trade did it happen?
      placeholder: https://rankings.trade/leaderboard
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: browser-device
    attributes:
      label: Browser / device
      description: e.g. Chrome 138 on macOS, Safari on iPhone 15.
    validations:
      required: false
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Optionally drag and drop a screenshot to help explain the problem.
    validations:
      required: false
