version: 10
board:
    name: rankings.trade
tasks_dir: tasks
statuses:
    - name: backlog
    - name: ready
    - name: preflight
    - name: in-dev
    - name: checks
    - name: needs-review
    - name: in-review
    - name: approved
    - name: done
    - name: blocked
priorities:
    - low
    - medium
    - high
    - critical
defaults:
    status: backlog
    priority: medium
    class: standard
claim_timeout: 1h
classes:
    - name: expedite
      wip_limit: 1
      bypass_column_wip: true
    - name: fixed-date
    - name: standard
    - name: intangible
tui:
    title_lines: 2
    age_thresholds:
        - after: 0s
          color: "242"
        - after: 1h
          color: "34"
        - after: 24h
          color: "226"
        - after: 72h
          color: "208"
        - after: 168h
          color: "196"
next_id: 16
