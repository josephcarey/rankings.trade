name = "rankings-trade"
main = "./.svelte-kit/cloudflare/_worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Clerk publishable key (client-safe, shipped to the browser anyway). svelte-clerk's
# server handler reads this from $env/dynamic/public at runtime, so it must exist as a
# Worker runtime var — not only as a build-time var — or SSR 500s with "Publishable key
# is missing". Safe to commit: publishable keys are public by design.
PUBLIC_CLERK_PUBLISHABLE_KEY = "pk_test_c3VwZXJiLWJvYS01Ni5jbGVyay5hY2NvdW50cy5kZXYk"

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "rankings-trade-prod"
database_id = "03f54a17-4210-412b-9d9b-641078b31a8c"
